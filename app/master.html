<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAESTRO - MT Fitness PRO Control</title>
    <style>
        :root {
            --primary: #007bff;
            --bg: #0a0a0a;
            --surface: #1a1a1a;
            --text: #ffffff;
            --muted: #888;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .title { font-size: 24px; font-weight: bold; color: var(--primary); letter-spacing: 2px; }
        .console {
            flex: 1;
            background: #000;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
            overflow-y: auto;
            margin-bottom: 20px;
            white-space: pre-wrap;
            color: #0f0;
        }
        .input-group {
            display: flex;
            gap: 10px;
        }
        input {
            flex: 1;
            background: var(--surface);
            border: 1px solid #333;
            color: white;
            padding: 15px;
            border-radius: 8px;
            outline: none;
        }
        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 30px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .token-group { margin-bottom: 10px; font-size: 12px; }
        .token-group input { padding: 5px; font-size: 10px; width: 200px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">AGENTE MAESTRO AI</div>
        <div class="token-group">
            Token: <input type="password" id="masterToken" value="MT_MASTER_PRO_2026">
        </div>
    </div>
    <div class="console" id="output">Iniciando sistema... listo para órdenes.</div>
    <div class="input-group">
        <input type="text" id="cmd" placeholder="Escribe un comando (ej: ls, python --version, dir)..." onkeydown="if(event.key==='Enter') sendCmd()">
        <button onclick="sendCmd()">EJECUTAR</button>
    </div>

    <script>
        const output = document.getElementById('output');
        const cmdInput = document.getElementById('cmd');
        const tokenInput = document.getElementById('masterToken');

        async function sendCmd() {
            const cmd = cmdInput.value;
            if (!cmd) return;
            
            output.innerHTML += `\n\n> ${cmd}\n`;
            cmdInput.value = '';
            output.scrollTop = output.scrollHeight;

            try {
                // Get JWT token from localStorage (if logged in to app)
                const user = JSON.parse(localStorage.getItem('user') || '{}');
                const token = user.token || 'ADMIN_DEV_TOKEN';

                const response = await fetch('/api/master/exec', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        cmd: cmd,
                        master_token: tokenInput.value
                    })
                });
                
                const data = await response.json();
                output.innerHTML += data.output || 'Sin respuesta.';
            } catch (e) {
                output.innerHTML += `ERROR: ${e.message}`;
            }
            output.scrollTop = output.scrollHeight;
        }
    </script>
</body>
</html>
